name: Android Release APKs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v1.0.1"
      prerelease:
        description: "Mark release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release:
    name: Build and publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all APK variants
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Collect APKs
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.tag }}"
          fi
          mkdir -p release-apks
          while IFS= read -r apk; do
            variant="$(basename "$(dirname "${apk}")")"
            name="ivLyrics-Android-${release_tag}-${variant}.apk"
            if [[ "${apk}" == *"unsigned"* ]]; then
              name="ivLyrics-Android-${release_tag}-${variant}-unsigned.apk"
            fi
            cp "${apk}" "release-apks/${name}"
          done < <(find app/build/outputs/apk -type f -name "*.apk" | sort)
          {
            echo "release_tag=${release_tag}"
            echo "apk_list<<EOF"
            find release-apks -type f -name "*.apk" -print | sort
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate release notes and version file
        env:
          RELEASE_TAG: ${{ steps.collect.outputs.release_tag }}
          APK_DIR: release-apks
          RELEASE_METADATA_DIR: release-metadata
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python3 .github/scripts/generate_release_metadata.py

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ivLyrics-Android-${{ steps.collect.outputs.release_tag }}-apks
          path: |
            release-apks/*.apk
            release-metadata/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.collect.outputs.release_tag }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "ivLyrics Android ${RELEASE_TAG}" \
              --notes-file release-metadata/release-notes.md \
              "${args[@]}"
            gh release upload "${RELEASE_TAG}" release-apks/*.apk release-metadata/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-apks/*.apk release-metadata/* \
              --target "${GITHUB_SHA}" \
              --title "ivLyrics Android ${RELEASE_TAG}" \
              --notes-file release-metadata/release-notes.md \
              "${args[@]}"
          fi
