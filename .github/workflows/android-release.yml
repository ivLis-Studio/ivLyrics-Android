name: Android Release APKs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v1.0.9"
      prerelease:
        description: "Mark release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release:
    name: Build and publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing repository secret: ${name}"
              missing=1
            fi
          done
          if [[ "${missing}" != "0" ]]; then
            exit 1
          fi

          keystore_path="${RUNNER_TEMP}/ivlyrics-release.jks"
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          {
            echo "IVLYRICS_RELEASE_STORE_FILE=${keystore_path}"
            echo "IVLYRICS_RELEASE_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}"
            echo "IVLYRICS_RELEASE_KEY_ALIAS=${ANDROID_KEY_ALIAS}"
            echo "IVLYRICS_RELEASE_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}"
          } >> "${GITHUB_ENV}"

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Collect APKs
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.tag }}"
          fi
          release_target="$(git rev-parse --verify "${release_tag}^{commit}" 2>/dev/null || git rev-parse HEAD)"
          mkdir -p release-apks
          while IFS= read -r apk; do
            if [[ "${apk}" == *"/release/"* && "${apk}" == *"unsigned"* ]]; then
              echo "::error::Release APK is unsigned: ${apk}"
              exit 1
            fi
            variant="$(basename "$(dirname "${apk}")")"
            name="ivLyrics-Android-${release_tag}-${variant}.apk"
            if [[ "${apk}" == *"unsigned"* ]]; then
              name="ivLyrics-Android-${release_tag}-${variant}-unsigned.apk"
            fi
            cp "${apk}" "release-apks/${name}"
          done < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | sort)
          {
            echo "release_tag=${release_tag}"
            echo "release_target=${release_target}"
            echo "apk_list<<EOF"
            find release-apks -type f -name "*.apk" -print | sort
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate release notes and version file
        env:
          RELEASE_TAG: ${{ steps.collect.outputs.release_tag }}
          APK_DIR: release-apks
          RELEASE_METADATA_DIR: release-metadata
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python3 .github/scripts/generate_release_metadata.py

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ivLyrics-Android-${{ steps.collect.outputs.release_tag }}-apks
          path: |
            release-apks/*.apk
            release-metadata/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.collect.outputs.release_tag }}
          RELEASE_TARGET: ${{ steps.collect.outputs.release_target }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' \
              | while IFS= read -r asset; do
                if [[ "${asset}" == *"-debug.apk" ]]; then
                  gh release delete-asset "${RELEASE_TAG}" "${asset}" --yes
                fi
              done
            gh release edit "${RELEASE_TAG}" \
              --target "${RELEASE_TARGET}" \
              --title "ivLyrics Android ${RELEASE_TAG}" \
              --notes-file release-metadata/release-notes.md \
              "${args[@]}"
            gh release upload "${RELEASE_TAG}" release-apks/*.apk release-metadata/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-apks/*.apk release-metadata/* \
              --target "${RELEASE_TARGET}" \
              --title "ivLyrics Android ${RELEASE_TAG}" \
              --notes-file release-metadata/release-notes.md \
              "${args[@]}"
          fi
